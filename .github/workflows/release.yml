name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Unit tests (app)
        run: npm run test

      - name: Unit tests (server)
        run: npm run test --prefix server

      - name: Type check (renderer)
        run: npm run typecheck:renderer

      - name: Type check (main process)
        run: npm run typecheck:main

      - name: Server type check
        run: npm run build --prefix server

      - name: Production build
        run: npm run build

  package:
    name: Package (${{ matrix.os }})
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            mac_arch: arm64
            artifact-name: mac-dmg-arm64
            artifact-glob: release/*arm64.dmg
          - os: macos-latest
            mac_arch: x64
            artifact-name: mac-dmg-x64
            artifact-glob: release/*.dmg
          - os: windows-latest
            artifact-name: win-exe
            artifact-glob: release/*.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Package — macOS
        if: runner.os == 'macOS'
        env:
          MAC_BUILD_ARCH: ${{ matrix.mac_arch }}
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/package-mac-ci.sh

      - name: Package — Windows
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify DuckDB native binding (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prebuilt = "node_modules\@duckdb\node-bindings-win32-x64\duckdb.node"
          if (-not (Test-Path $prebuilt)) {
            throw "DuckDB prebuild missing before packaging: $prebuilt"
          }
          Write-Host "Pre-package DuckDB binding OK: $prebuilt"
          pwsh -File scripts/verify-duckdb-packaged.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-glob }}
            release/*.yml
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CPS Contract Parser ${{ github.ref_name }}
          files: |
            artifacts/mac-dmg-arm64/**
            artifacts/mac-dmg-x64/**
            artifacts/win-exe/**
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
