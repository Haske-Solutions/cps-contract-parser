name: Package

# Build installers on the correct OS without creating a git tag or GitHub Release.
# Use for Windows builds from a Mac dev machine (native DuckDB/keytar require per-OS runners).
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to package
        required: true
        default: both
        type: choice
        options:
          - mac
          - win
          - both

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Unit tests (app)
        run: npm run test

      - name: Unit tests (server)
        run: npm run test --prefix server

      - name: Type check (renderer)
        run: npm run typecheck:renderer

      - name: Type check (main process)
        run: npm run typecheck:main

      - name: Server type check
        run: npm run build --prefix server

      - name: Production build
        run: npm run build

  package-mac:
    name: Package macOS (${{ matrix.mac_arch }})
    needs: gate
    if: inputs.platform == 'mac' || inputs.platform == 'both'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        mac_arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Package — macOS
        env:
          MAC_BUILD_ARCH: ${{ matrix.mac_arch }}
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/package-mac-ci.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.mac_arch }}
          path: ${{ matrix.mac_arch == 'arm64' && 'release/*arm64.dmg' || 'release/*.dmg' }}
          if-no-files-found: error
          retention-days: 30

  package-win:
    name: Package Windows
    needs: gate
    if: inputs.platform == 'win' || inputs.platform == 'both'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Package — Windows
        run: npx electron-builder --win --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify DuckDB native binding (Windows)
        shell: pwsh
        run: |
          $prebuilt = "node_modules\@duckdb\node-bindings-win32-x64\duckdb.node"
          if (-not (Test-Path $prebuilt)) {
            throw "DuckDB prebuild missing before packaging: $prebuilt"
          }
          Write-Host "Pre-package DuckDB binding OK: $prebuilt"
          pwsh -File scripts/verify-duckdb-packaged.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
