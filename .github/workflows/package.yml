name: Package

# Build installers on the correct OS without creating a git tag or GitHub Release.
# Use for Windows builds from a Mac dev machine (native DuckDB/keytar require per-OS runners).
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to package
        required: true
        default: both
        type: choice
        options:
          - mac
          - win
          - both

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Unit tests (app)
        run: npm run test

      - name: Unit tests (server)
        run: npm run test --prefix server

      - name: Type check (renderer)
        run: npm run typecheck:renderer

      - name: Type check (main process)
        run: npm run typecheck:main

      - name: Server type check
        run: npm run build --prefix server

      - name: Production build
        run: npm run build

  package-mac:
    name: Package macOS
    needs: gate
    if: inputs.platform == 'mac' || inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Package — macOS
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify DuckDB native binding (macOS)
        run: |
          set -e
          for arch in mac-arm64 mac; do
            app="release/${arch}/CPS Contract Parser.app"
            if [ -d "$app" ]; then
              duckdb="$app/Contents/Resources/app.asar.unpacked/node_modules/@duckdb"
              if ! find "$duckdb" -name 'duckdb.node' | grep -q .; then
                echo "Missing DuckDB .node under $duckdb"
                exit 1
              fi
              echo "DuckDB binding OK in $app"
              break
            fi
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  package-win:
    name: Package Windows
    needs: gate
    if: inputs.platform == 'win' || inputs.platform == 'both'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Package — Windows
        run: npx electron-builder --win --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify DuckDB native binding (Windows)
        shell: pwsh
        run: |
          $path = "release\win-unpacked\resources\app.asar.unpacked\node_modules\@duckdb\node-bindings-win32-x64\duckdb.node"
          if (-not (Test-Path $path)) {
            throw "Missing DuckDB Windows native module: $path (was this built on macOS?)"
          }
          Write-Host "DuckDB binding OK: $path"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
