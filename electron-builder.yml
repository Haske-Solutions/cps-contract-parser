appId: com.chelipeacock.contract-parser
productName: CPS Contract Parser
copyright: "Copyright © 2026 Cheli and Peacock Safaris"

# Native modules (@duckdb/node-api, keytar) require per-OS builds — see docs/PACKAGING.md.
# Do not use electron-builder --win on macOS; the Windows installer will miss duckdb.node.

asar: true

asarUnpack:
  - "**/*.node"
  - "**/node_modules/@duckdb/**"

directories:
  output: release/
  buildResources: resources/

files:
  - dist/**/*
  - package.json
  - "!src/**/*"
  - "!**/*.{ts,tsx,map}"
  - "!node_modules/.cache/**"
  - "!.env*"

extraResources:
  - from: resources/icon.png
    to: icon.png

# macOS signing + notarization (release builds only — skipped when env vars are absent)
# Required env:
#   CSC_LINK or CSC_NAME          Developer ID Application certificate
#   CSC_KEY_PASSWORD              Certificate password (if using CSC_LINK)
#   APPLE_ID                      Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD   App-specific password
#   APPLE_TEAM_ID                 10-character Team ID
afterSign: scripts/notarize.js

mac:
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: CPS Contract Parser
  icon: resources/icon.icns
  iconSize: 128
  background: resources/dmg-background.png
  window:
    width: 658
    height: 498
  contents:
    - x: 180
      y: 240
      type: file
    - x: 478
      y: 240
      type: link
      path: /Applications

win:
  publisherName: "Cheli and Peacock Safaris"
  target:
    - target: nsis
      arch:
        - x64
  # Explicitly disable Authenticode signing (unsigned .exe). Remove sign: null when WIN_CSC_* secrets are ready.
  sign: null
  signingHashAlgorithms: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  license: license.txt
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerSidebar: installer-sidebar.bmp
  installerHeader: installer-header.bmp
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: Haske-Solutions
  repo: cps-contract-parser
  releaseType: release
