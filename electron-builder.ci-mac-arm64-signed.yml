# CI signed macOS arm64 DMG + ZIP.
# ZIP is required alongside the DMG — electron-updater's macOS auto-updater only
# understands ZIP packages ("ZIP file not provided" if only a DMG is published).
extends: electron-builder.yml
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
